# QA Integrations Implementation Expertise
# Adobe Experience QA Platform — external service integrations
#
# USAGE: Mental model for all qa-integrations tasks.
# Every file path and function name is verified against the real codebase.
# Run /mental-model:qa-integrations:self-improve after any integration changes.

overview:
  description: "Server-only external integrations that drive pricing validation (WCS/AOS/OSI), platform event ingestion (Adobe I/O/webhooks), and failure notification (Jira/Slack) — never called directly from the client."
  core_insight: "All integrations are called exclusively by server services (runner.js, webhooks action); the client never touches them. AIO Runtime params are the env var carrier — not process.env — except where explicitly set via app.config.yaml annotations."
  architecture_pattern: "Thin stateless service modules (no class instances, only exported async functions). Each integration reads credentials from process.env at call time, not at module load."
  value_proposition:
    - "WCS/AOS: source-of-truth price fetching enables DOM-vs-API price comparison"
    - "OSI mapping: product × commitment × country → OSI lookup bridges plan intent to WCS params"
    - "Adobe I/O / webhooks: AEM ContentPublished events auto-trigger QA runs without manual intervention"
    - "Jira: critical/high step failures auto-create P1/P2 tickets with screenshot attachments"
    - "Slack: Block Kit run-start and run-complete notifications with per-failure bullet list"

# ─── KEY FILES ────────────────────────────────────────────────────────────────

key_files:
  adobe_commerce:
    wcs:
      file: "apps/experience-qa/server/services/wcs.js"
      purpose: "WCS web_commerce_artifact API client — fetches expected display price for a given OSI + country + locale. This is the same endpoint MAS JavaScript uses on the page, making it a direct equality source for DOM price comparison."
      key_functions:
        getExpectedPrice: "getExpectedPrice(osi, country, locale) → { price, formatString, taxDisplay, taxTerm, currency }; reads WCS_API_KEY from env (defaults to public key if unset); throws on non-2xx or missing resolvedOffers[0]"

    aos:
      file: "apps/experience-qa/server/services/aos.js"
      purpose: "AOS (Adobe Offer Service) API client — fetches canonical (pre-formatting) price one layer below WCS. Used to cross-check WCS when a price mismatch is detected."
      key_functions:
        getCanonicalPrice: "getCanonicalPrice(offerId, country, locale) → { price, currency, commitment, term }; sets x-api-key header if AOS_API_KEY env var present; offerId is AOS offer ID, distinct from OSI"

    osi_mapping:
      file: "apps/experience-qa/server/services/osi-mapping.js"
      purpose: "DB-backed lookup: product × commitment × country → OSI (and offerId). Bridges plan step intent (e.g. ACROBAT_PRO / ABM / MX) to the OSI needed by wcs.getExpectedPrice(). Seeded from OST exports by PM team."
      key_functions:
        lookupOSI: "lookupOSI({ product, commitment, country }) → mapping | null; queries osi_mappings collection; normalizes all three keys to UPPERCASE before lookup"
        upsertMappings: "upsertMappings(mappings[]) → { inserted, updated }; batch upsert for OST export seeds; match key is product+commitment+country; calls initStorage() internally"

  adobe_platform:
    adobe_io:
      file: "apps/experience-qa/server/services/adobe-io.js"
      purpose: "Adobe I/O Events utilities: HMAC signature verification and AEM content path → public URL mapping."
      key_functions:
        verifySignature: "verifySignature(req) → boolean; reads AIO_EVENTS_WEBHOOK_SECRET from env; header is X-Adobe-Signature-256; format: sha256=<hex>; returns false (not throws) when secret missing or mismatch"
        mapAEMPathToURL: "mapAEMPathToURL(contentPath) → string | null; strips /content/{site}/{lang}/ prefix; appends .html; e.g. /content/cc/en/creativecloud/plans → https://www.adobe.com/creativecloud/plans.html"

    webhooks:
      file: "apps/experience-qa/server/actions/webhooks/index.js"
      purpose: "AIO Runtime action handler for all incoming webhook POST calls. Routes /webhooks/jira, /webhooks/slack, /webhooks/aem. Declared web:'raw' in app.config.yaml so body is NOT pre-parsed — HMAC verification requires the raw bytes."
      key_functions:
        main: "main(params) — OpenWhisk entry point; reads __ow_method, __ow_path, __ow_body, __ow_headers, __ow_query"
        extractSubPath: "extractSubPath(owPath) → 'jira'|'slack'|'aem'|null; strips /webhooks/ prefix; handles AIO path variations"
        parseBody: "parseBody(params) → { raw, parsed }; decodes base64 __ow_body; raw string used for HMAC; parsed object used for logic"
        verifyJiraSignature: "verifyJiraSignature(rawBody, headers) → boolean; header X-Hub-Signature; JIRA_WEBHOOK_SECRET; skips (returns true) if secret unset"
        verifySlackSignature: "verifySlackSignature(rawBody, headers) → boolean; header X-Slack-Signature; v0=HMAC-SHA256; 300s replay-attack window; SLACK_SIGNING_SECRET"
        verifyAdobeSignature: "verifyAdobeSignature(rawBody, headers) → boolean; header X-Adobe-Signature-256; WEBHOOK_SECRET env var; returns true if unset (local dev)"
        handleJiraWebhook: "handleJiraWebhook(parsed) → { received, event, issueKey }; logs event; future hook for Jira→run status sync"
        handleSlackWebhook: "handleSlackWebhook(parsed) → { challenge } | { received, event }; responds to Slack URL verification challenge"
        handleAEMWebhook: "handleAEMWebhook(parsed, rawBody, headers, queryParams) → result; handles Adobe I/O challenge param; maps AEM path to URL; matches plans by urlBase prefix; fires executeRun() as fire-and-forget per geo"

  notifications:
    jira:
      file: "apps/experience-qa/server/services/jira.js"
      purpose: "Jira Cloud REST API v3 client. Creates Bug issues with ADF description body, severity-mapped priority, and optional screenshot attachment. Called by runner.js for critical/high step failures in local (non-K8s) mode only."
      key_functions:
        createIssue: "createIssue({ summary, description, screenshotBuffer?, screenshotName?, runId, geo, product, severity }) → { issueId, issueKey, url }; auth: HTTP Basic (JIRA_EMAIL:JIRA_TOKEN); priority map: critical→P1, high→P2, medium→P3, low→P4; labels: experience-qa, geo:{geo}, product:{product}; screenshot attachment is non-fatal (warns on failure)"

    slack:
      file: "apps/experience-qa/server/services/slack.js"
      purpose: "Slack Incoming Webhook integration (Block Kit). Posts run-start and run-complete notifications. Called by runner.js in local mode only. If SLACK_WEBHOOK_URL is unset, silently skips without throwing."
      key_functions:
        postRunStarted: "postRunStarted(plan, geos) → void; plan: { name, urlBase }; geos: string[]; posts single Block Kit section with plan name, URL, geo list"
        postRunSummary: "postRunSummary(run, plan, stepResults) → void; run: { _id, geo, status }; stepResults: { status, action, details, severity }[]; posts passed/failed counts + per-failure bullets + 'View Results' button linking to APP_URL/runs/{run._id}"

# ─── PATTERNS ─────────────────────────────────────────────────────────────────

patterns:
  price_validation_flow: |
    Full price-check pipeline for an extract_price step:
    1. runner.js._executeStep() receives step.type === 'extract_price'
    2. browser.waitForCommerceReady(page) — MUST be called first; MAS hydrates prices async
    3. browser.extractDOM(page) → { text, html }
    4. price-checker.extractPrices(domText, domHtml) → { original, discounted, displayedPercentage }
    5. If step.osi present: osi-mapping.lookupOSI({ product, commitment, country }) → mapping
    6. wcs.getExpectedPrice(mapping.osi, geo, mapping.locale) → { price, currency, ... }
    7. price-checker.compareToExpected({ actual, expected, currency, threshold }) → { pass, ... }
    8. If mismatch and step.crossCheck: aos.getCanonicalPrice(mapping.offerId, geo, locale) for triage
    Note: OSI locale uses underscore format (es_MX), not hyphen (es-MX). WCS expects underscore.

  geo_url_resolution: |
    How a plan step resolves the final URL for a geo:
    1. storage.getState('geo:{GEO}') → GeoMapping { urlPath, locale, acceptLanguage, akamaiLocale }
    2. browser.navigateTo(page, step.url, geo) appends ?akamaiLocale={geoMapping.akamaiLocale}&langfirst=on
    3. AOS/WCS calls use geo.country (uppercase, e.g. 'MX') and geo.locale (e.g. 'es-MX')
    4. OSI lookup uses country uppercase — osi-mapping normalizes via .toUpperCase()
    5. WCS locale param uses underscore: osi_mapping.locale field stores 'es_MX' (OST export convention)

  webhook_trigger: |
    AEM ContentPublished → auto QA run flow:
    1. AEM publishes content → Adobe I/O Events fires POST /webhooks/aem
    2. webhooks action: params.__ow_query?.challenge? → return { challenge } (registration handshake)
    3. verifyAdobeSignature(rawBody, headers) vs WEBHOOK_SECRET — 401 if fails
    4. Parse event.type === 'aem:ContentPublished'; extract event.path
    5. mapAEMPathToURL(contentPath) → publishedURL (returns null → ignore)
    6. store.findDocs('test_plans', {}) → filter by plan.urlBase prefix match
    7. For each matched plan × geo: upsertDoc(TEST_RUNS, runId, { triggeredBy:'webhook' })
    8. executeRun(runId, plan, geo) — fire-and-forget (Promise.catch logs error)
    9. Return { status:'triggered', url, runs:[{ planId, geo, runId }] }
    Key: webhooks action has require-adobe-auth:false in app.config.yaml (external caller)

  jira_on_failure: |
    How runner.js creates Jira tickets for failures:
    1. runner._executeStep() returns StepResult with status:'failed' and severity:'critical'|'high'
    2. After all steps complete, runner._fireJiraTickets(results, plan, geo, runId) is called
    3. _fireJiraTickets filters results where status==='failed' && (severity==='critical'||'high')
    4. For each: jira.createIssue({ summary: step.action, description, screenshotBuffer, runId, geo, product, severity })
    5. screenshotBuffer: downloaded from blob storage (store.downloadFile(result.screenshotPath))
    6. Issue title format: [CRITICAL] MX — Acrobat Pro: <step.action>
    7. Labels: experience-qa, geo:mx, product:acrobat-pro (lowercase)
    8. CRITICAL: _fireJiraTickets only runs when RUNNER_MODE !== 'k8s'

  slack_alert: |
    Slack notification lifecycle for a run:
    1. runner.executeRun() begins → slack.postRunStarted(plan, [geo]) (local mode only)
    2. Steps execute one-by-one
    3. runner.executeRun() completes → slack.postRunSummary(run, plan, stepResults) (local mode only)
    4. postRunSummary builds Block Kit blocks: summary section + pass/fail counts + failure bullets + View Results button
    5. APP_URL env var controls the 'View Results' button URL (defaults to http://localhost:5173)
    6. If SLACK_WEBHOOK_URL is unset: post() logs a warning and returns without throwing
    7. CRITICAL: Slack calls are suppressed when RUNNER_MODE === 'k8s'

# ─── DATA SHAPES ──────────────────────────────────────────────────────────────

data_shapes:
  WCSExpectedPrice:
    description: "Output of wcs.getExpectedPrice()"
    fields:
      - "price (number|null): display price (offer.price ?? offer.regularPrice)"
      - "formatString (string|null): locale price format string from WCS"
      - "taxDisplay (string|null): e.g. 'TAX_INCLUSIVE'"
      - "taxTerm (string|null): e.g. 'VAT'"
      - "currency (string|null): ISO 4217 e.g. 'MXN'"

  AOSCanonicalPrice:
    description: "Output of aos.getCanonicalPrice()"
    fields:
      - "price (number|null): pre-formatting canonical price"
      - "currency (string|null): ISO 4217"
      - "commitment (string|null): e.g. 'ANNUAL'"
      - "term (string|null): e.g. 'MONTHLY'"

  OSIMapping:
    description: "DB document in osi_mappings collection; output of osi-mapping.lookupOSI()"
    collection: "osi_mappings"
    fields:
      - "_id (string): UUID"
      - "product (string): UPPER_SNAKE e.g. 'ACROBAT_PRO'"
      - "commitment (string): OST code e.g. 'ABM' (Annual Billed Monthly), 'PUF', 'M2M'"
      - "country (string): ISO 3166-1 uppercase e.g. 'MX'"
      - "locale (string): WCS underscore format e.g. 'es_MX' (NOT 'es-MX')"
      - "osi (string): Offer Selector ID e.g. 'MQ3TwzT5FTlRSgsELBYjTQ'"
      - "offerId (string|null): AOS offer ID for cross-check; distinct from OSI"
      - "updatedAt (ISO 8601)"

  JiraIssueInput:
    description: "Input to jira.createIssue()"
    fields:
      - "summary (string): short title → becomes [SEVERITY] GEO — product: summary"
      - "description (string): plain text → wrapped in Atlassian Document Format"
      - "screenshotBuffer (Buffer|undefined): PNG bytes; attached to issue if provided"
      - "screenshotName (string|undefined): filename; defaults to {geo}-{runId}-failure.png"
      - "runId (string): stored in JIRA_RUN_ID_FIELD custom field if env var set"
      - "geo (string): uppercase e.g. 'MX'"
      - "product (string): product label for title and Jira label"
      - "severity ('critical'|'high'|'medium'|'low'): maps to P1/P2/P3/P4"

  JiraIssueOutput:
    description: "Return value of jira.createIssue()"
    fields:
      - "issueId (string): Jira internal numeric string ID"
      - "issueKey (string): e.g. 'EQA-123'"
      - "url (string): full browse URL e.g. 'https://jira.corp.adobe.com/browse/EQA-123'"

  SlackRunSummaryInput:
    description: "Input to slack.postRunSummary()"
    fields:
      - "run: { _id (string), geo (string), status (string) }"
      - "plan: { name (string), urlBase (string) }"
      - "stepResults: Array<{ status, action, details, severity }>"

  AEMWebhookEvent:
    description: "Incoming Adobe I/O ContentPublished payload parsed from base64 __ow_body"
    fields:
      - "type (string): 'aem:ContentPublished'"
      - "path (string): AEM content path e.g. '/content/cc/en/creativecloud/plans'"
      - "event.type / event.path: alternate nesting — handler checks both"

  WCSAPIRequest:
    description: "Query params sent to https://www.adobe.com/web_commerce_artifact"
    fields:
      - "offer_selector_ids (string): the OSI"
      - "country (string): ISO 3166-1 alpha-2 uppercase"
      - "locale (string): BCP-47 underscore format e.g. 'es_MX'"
      - "language: 'MULT'"
      - "landscape: 'PUBLISHED'"
      - "api_key (string): WCS_API_KEY env var or public default"

# ─── INTEGRATION POINTS ───────────────────────────────────────────────────────

integration_points:
  caller:
    runner_calls_jira: "runner.js._fireJiraTickets() calls jira.createIssue() for critical/high failures; only in local mode (RUNNER_MODE !== 'k8s')"
    runner_calls_slack: "runner.js.executeRun() calls slack.postRunStarted() at start and slack.postRunSummary() at end; only in local mode"
    runner_calls_price_services: "runner.js._executeStep() (type=extract_price) calls price-checker then optionally wcs.getExpectedPrice(); aos.getCanonicalPrice() used for cross-check triage"
    webhooks_calls_runner: "webhooks action handleAEMWebhook() calls runner.js.executeRun() fire-and-forget for each matched plan × geo"
    osi_mapping_called_by: "osi-mapping.lookupOSI() is called by runner.js or plan steps when step.osi is not already set; requires product+commitment+country in step data"
    adobe_io_used_by: "adobe-io.js verifySignature() is partially replicated inline in webhooks/index.js (verifyAdobeSignature local fn); mapAEMPathToURL() is also inlined — adobe-io.js is a utility module referenced but the webhooks action has its own inline copies"

  storage:
    osi_mapping_uses_storage: "osi-mapping.js imports and calls initStorage() — it persists mappings to the osi_mappings DB collection"
    webhooks_uses_storage: "webhooks action calls initStorage() to find matching test_plans and upsert test_runs for AEM-triggered runs"

  aio_runtime:
    webhooks_web_raw: "webhooks action is web:'raw' in app.config.yaml — body not pre-parsed, required for HMAC; all other actions use web:'yes'"
    webhooks_no_auth: "webhooks action has require-adobe-auth:false — AEM I/O Events is the caller, not a human user"
    all_others_require_auth: "chat, plans, runs, schedules, settings all have require-adobe-auth:true"

# ─── ENV VARS ─────────────────────────────────────────────────────────────────

env_vars:
  wcs:
    WCS_API_KEY: "WCS API key; optional — defaults to 'wcms-commerce-ims-ro-user-wwwoffers' (public read-only key)"
  aos:
    AOS_API_KEY: "AOS API key; optional — header x-api-key only sent when set"
  jira:
    JIRA_BASE_URL: "required — Jira Cloud base URL e.g. 'https://jira.corp.adobe.com'"
    JIRA_PROJECT_KEY: "required — project key e.g. 'EQA'"
    JIRA_EMAIL: "required — Atlassian account email for Basic auth"
    JIRA_TOKEN: "required — Atlassian API token for Basic auth"
    JIRA_WEBHOOK_SECRET: "optional — HMAC secret for incoming Jira webhooks; if unset, signature check is skipped (local dev)"
    JIRA_RUN_ID_FIELD: "optional — custom field ID (e.g. 'customfield_10042') to store runId on Jira issue"
  slack:
    SLACK_WEBHOOK_URL: "required for notifications — Slack Incoming Webhook URL; if unset, postRunStarted/postRunSummary silently no-op"
    SLACK_SIGNING_SECRET: "optional — for verifying incoming Slack event API callbacks; if unset, signature check is skipped"
    APP_URL: "optional — base URL for 'View Results' button in Slack; defaults to 'http://localhost:5173'"
  webhooks:
    WEBHOOK_SECRET: "HMAC secret for Adobe I/O Events (AEM webhooks) — header X-Adobe-Signature-256; if unset, verification skipped in dev"
    AIO_EVENTS_WEBHOOK_SECRET: "Used by adobe-io.js verifySignature() — note: webhooks/index.js uses WEBHOOK_SECRET directly (not AIO_EVENTS_WEBHOOK_SECRET)"
  runner_mode:
    RUNNER_MODE: "Set to 'k8s' in K8s worker pods — suppresses Jira/Slack side-effects in K8s mode"

# ─── GOTCHAS ──────────────────────────────────────────────────────────────────

gotchas:
  - "AIO Runtime env vars come from params, not process.env by default. Services that read process.env (jira, slack, wcs, aos) require those vars to be explicitly forwarded via app.config.yaml annotations or injected into the runtime environment."
  - "OSI is NOT an API call — osi-mapping.js queries the DB (osi_mappings collection), not an external API. The data must be seeded first via upsertMappings() from OST exports. An empty table returns null silently."
  - "OSI locale uses underscores (es_MX), not hyphens (es-MX). The GeoMapping KV record (geo:{GEO}) stores locale in hyphen format. These are different fields — do not interchange them when calling wcs.getExpectedPrice()."
  - "webhooks/index.js inlines its own verifyAdobeSignature() and mapAEMPathToURL() — they do NOT import from adobe-io.js. The adobe-io.js module is a standalone utility. Both implementations must be kept in sync if either changes."
  - "webhooks action uses web:'raw' in app.config.yaml. Body is base64 in params.__ow_body. parseBody() must decode it before HMAC verification. Do NOT use the parsed object for signature — use the raw string."
  - "WEBHOOK_SECRET (used by webhooks/index.js verifyAdobeSignature) and AIO_EVENTS_WEBHOOK_SECRET (used by adobe-io.js verifySignature) are different env var names for the same conceptual secret. They are not currently unified."
  - "Jira and Slack side-effects (createIssue, postRunSummary) are SUPPRESSED when RUNNER_MODE=k8s. K8s worker pods set this env var. Never add Jira/Slack calls outside of _fireJiraTickets and the two explicit slack calls in executeRun()."
  - "jira.js screenshot attachment failure is non-fatal — the issue is created and a console.warn is emitted. The caller (runner._fireJiraTickets) must handle this gracefully and not retry the entire issue creation."
  - "AEM challenge handshake: when Adobe I/O Events registers a webhook, it sends GET /webhooks/aem?challenge=<token>. webhooks/index.js handleAEMWebhook checks queryParams?.challenge and echoes it back. This must remain before signature verification."
  - "Slack URL verification: when setting up a Slack app event subscription, Slack sends { type:'url_verification', challenge:'...' }. handleSlackWebhook checks parsed.type === 'url_verification' and responds with { challenge }. This is before any event logic."
  - "WCS defaults to a public API key if WCS_API_KEY is unset. This means price fetches will work in dev without credentials but may be rate-limited or return different data than prod. Always set WCS_API_KEY in production."
  - "aos.getCanonicalPrice() offerId is NOT the same as OSI. The osi_mappings document has both osi and offerId fields. Passing an OSI to AOS will return wrong data or error."

# ─── BEST PRACTICES ───────────────────────────────────────────────────────────

best_practices:
  - "Read credentials from process.env at call time inside the exported function — never at module scope. AIO Runtime may not have credentials available at import time."
  - "Guard all outbound integrations with env var checks before making HTTP calls. Jira and Slack should warn-and-return (not throw) when credentials are missing, so a single unconfigured integration doesn't abort an entire run."
  - "Always call browser.waitForCommerceReady() before extractDOM() on any adobe.com commerce page. Prices are hydrated async by MAS JavaScript — DOM text will be empty or show placeholders otherwise."
  - "When seeding OSI mappings, normalize product/commitment/country to UPPERCASE before calling upsertMappings() — lookupOSI() uppercases on lookup, but upsertMappings() also normalizes, so either direction is safe."
  - "Use the offerId field from osi_mappings when calling aos.getCanonicalPrice() — never pass the osi field to AOS. They are different identifier systems."
  - "Keep Jira and Slack calls isolated to runner.js (via _fireJiraTickets and the explicit calls in executeRun). Do not add notification calls to other services — this keeps side-effects observable and suppressible via RUNNER_MODE."
  - "Treat webhook signature failures as hard 401 rejections, not warnings. The verifyJiraSignature/verifySlackSignature functions return true when secrets are unset (dev mode) — this is intentional and should not be changed for production."
  - "AEM webhook AIO challenge param must be handled before signature verification — the challenge request comes without a body or signature."

# ─── KEY FILE LOCATIONS ───────────────────────────────────────────────────────

key_file_locations:
  adobe_commerce:
    wcs:         "apps/experience-qa/server/services/wcs.js"
    aos:         "apps/experience-qa/server/services/aos.js"
    osi_mapping: "apps/experience-qa/server/services/osi-mapping.js"

  adobe_platform:
    adobe_io: "apps/experience-qa/server/services/adobe-io.js"
    webhooks: "apps/experience-qa/server/actions/webhooks/index.js"

  notifications:
    jira:  "apps/experience-qa/server/services/jira.js"
    slack: "apps/experience-qa/server/services/slack.js"

  config:
    aio_manifest: "app.config.yaml"
